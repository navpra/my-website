<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact | Naveen Prasad</title>

<style>
body{font-family:Poppins;background:#f5f7fb;margin:0;}
.container{max-width:600px;margin:auto;padding:40px;}
input,textarea{width:100%;padding:10px;margin:10px 0;border-radius:5px;border:1px solid #ccc;}
.btn{background:#00b4d8;color:white;padding:10px 20px;border:none;border-radius:20px;cursor:pointer;}
</style>
</head>

<body>

<div class="container">

<h1>Contact</h1>

<form id="contactForm">
<input type="text" id="name" placeholder="Your Name" required>
<input type="email" id="email" placeholder="Your Email" required>
<textarea id="message" placeholder="Message" required></textarea>
<button class="btn">Send Message</button>
</form>

<p id="status"></p>

<br><br>

<h2>Or Book Directly</h2>

<iframe src="https://calendly.com/naveenprasad-naveen/30min"
width="100%" height="600"></iframe>

</div>

<script>
document.getElementById("contactForm").addEventListener("submit", async function(e){
e.preventDefault();

await fetch("https://contact-form.naveenprasad-naveen.workers.dev",{method:"POST"});

document.getElementById("status").innerText="Message sent successfully!";
});
</script>

</body>
</html>
